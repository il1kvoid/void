<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Void+ | Minecraft Vanilla+</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #000000;
            --white: #ffffff;
            --dark-gray: #111111;
            --light-gray: #888888;
        }

        body {
            background-color: var(--black);
            color: var(--white);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 100px 20px 60px;
        }

        h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(3rem, 10vw, 5rem);
            margin: 0;
            letter-spacing: 15px;
            text-transform: uppercase;
            border-bottom: 2px solid var(--white);
            display: inline-block;
            padding-bottom: 10px;
        }

        .subtitle {
            margin-top: 20px;
            font-weight: 300;
            letter-spacing: 4px;
            color: var(--light-gray);
            text-transform: uppercase;
        }

        .ip-container {
            margin-top: 40px;
            padding: 15px 30px;
            border: 1px solid var(--white);
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .ip-container:hover {
            background-color: var(--white);
            color: var(--black);
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 1000px;
            margin: 60px 0;
        }

        .card {
            background: var(--dark-gray);
            padding: 40px;
            text-decoration: none;
            color: var(--white);
            border-left: 0px solid var(--white);
            transition: all 0.3s ease;
        }

        .card:hover {
            background: var(--white);
            color: var(--black);
            border-left: 10px solid var(--black);
            transform: scale(1.02);
        }

        .card h3 {
            margin: 0 0 10px 0;
            font-size: 1.5rem;
            text-transform: uppercase;
        }

        .card p {
            margin: 0;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        footer {
            margin-top: auto;
            padding: 40px;
            color: var(--dark-gray);
            font-size: 0.8rem;
            text-align: center;
        }

        /* Анимация появления */
        .fade-in {
            animation: fadeIn 1.5s ease-in;
        }
