<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Void+ | Official Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Montserrat:wght@200;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <style>
        :root {
            --bg: #000000;
            --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #ffffff;
        }

        * { box-sizing: border-box; scroll-behavior: smooth; }
        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: 'Montserrat', sans-serif; overflow-x: hidden;
        }

        /* --- BACKGROUND --- */
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.4; }
        .vignette { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent 20%, #000 120%); pointer-events: none; z-index: 0; }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 40px; position: relative; z-index: 2; }

        /* --- NAV --- */
        nav {
            position: fixed; top: 0; width: 100%; padding: 25px 0;
            backdrop-filter: blur(30px); border-bottom: 1px solid var(--glass-border); z-index: 1000;
        }
        .nav-flex { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Orbitron'; font-weight: 900; letter-spacing: 10px; font-size: 1.5rem; text-decoration: none; color: #fff; }
        .nav-links a { text-decoration: none; color: #666; font-size: 0.7rem; font-weight: 900; letter-spacing: 2px; margin-left: 30px; transition: 0.3s; }
        .nav-links a:hover { color: #fff; }

        /* --- HERO --- */
        .hero { height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .hero h1 { font-family: 'Orbitron'; font-size: clamp(4rem, 15vw, 10rem); margin: 0; letter-spacing: -5px; line-height: 0.8; }
        .ip-box {
            margin-top: 50px; background: var(--glass); border: 1px solid var(--glass-border);
            padding: 10px; border-radius: 100px; display: flex; align-items: center; cursor: pointer; transition: 0.4s;
        }
        .ip-box:hover { border-color: #fff; transform: scale(1.02); }
        .ip-box span { padding: 0 40px; font-family: 'Orbitron'; font-weight: 700; letter-spacing: 4px; }
        .copy-btn { background: #fff; color: #000; padding: 15px 30px; border-radius: 100px; font-weight: 900; font-size: 0.7rem; }

        /* --- SECTION TITLES --- */
        .section-title { font-family: 'Orbitron'; font-size: 0.8rem; letter-spacing: 10px; margin: 100px 0 40px; color: #444; text-transform: uppercase; border-bottom: 1px solid #111; padding-bottom: 10px; }

        /* --- NEWS SYSTEM --- */
        .news-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .news-item { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; padding: 30px; transition: 0.3s; }
        .news-item:hover { border-color: #444; }
        .news-date { font-size: 0.6rem; font-weight: 800; color: #555; margin-bottom: 10px; display: block; }
        .news-item h3 { margin: 0 0 15px; font-family: 'Orbitron'; font-size: 1.2rem; }
        .news-item p { font-size: 0.9rem; color: #888; line-height: 1.6; margin: 0; }

        /* --- RULES SYSTEM (ACCORDION) --- */
        .rules-container { display: flex; flex-direction: column; gap: 10px; }
        .rule-group { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 15px; overflow: hidden; }
        .rule-header { padding: 20px 30px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .rule-header:hover { background: rgba(255,255,255,0.02); }
        .rule-header h3 { margin: 0; font-family: 'Orbitron'; font-size: 0.9rem; letter-spacing: 2px; }
        .rule-content { padding: 0 30px; max-height: 0; overflow: hidden; transition: 0.4s ease-out; color: #888; font-size: 0.9rem; line-height: 1.8; }
        .rule-group.active .rule-content { padding: 20px 30px; max-height: 2000px; border-top: 1px solid var(--glass-border); }
        .rule-content b { color: #fff; }
        .rule-content ul { padding-left: 20px; }

        /* --- QUICK LINKS --- */
        .quick-links { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
        .q-link { background: #fff; color: #000; text-align: center; padding: 20px; border-radius: 15px; text-decoration: none; font-weight: 900; font-size: 0.8rem; transition: 0.3s; }
        .q-link:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(255,255,255,0.1); }

        footer { padding: 100px 0 50px; text-align: center; opacity: 0.2; font-size: 0.7rem; letter-spacing: 5px; }

        @media (max-width: 768px) {
            .quick-links { grid-template-columns: 1fr; }
            .hero h1 { font-size: 4rem; }
        }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="vignette"></div>

<nav>
    <div class="container nav-flex">
        <a href="#" class="logo">VOID+</a>
        <div class="nav-links">
            <a href="#news">НОВОСТИ</a>
            <a href="#rules">ПРАВИЛА</a>
            <a href="https://t.me/VoidVanilaSMP" target="_blank">TG</a>
        </div>
    </div>
</nav>

<div class="container">
    <section class="hero" data-aos="zoom-in">
        <h1>VOID+</h1>
        <div class="ip-box" onclick="copyIP()">
            <span id="ip-text">PLAY.VOIDPLUS.ME</span>
            <div class="copy-btn">COPY IP</div>
        </div>
        <div class="quick-links">
            <a href="https://t.me/VoidVanilaSMP" class="q-link">TELEGRAM</a>
            <a href="https://modrinth.com/plugin/plasmo-voice" class="q-link">VOICE MOD</a>
            <a href="https://nightexpressdev.com/excellentenchants/enchantments/list/" class="q-link">ENCHANTS</a>
        </div>
    </section>

    <div class="section-title" id="news">Последние события</div>
    <div class="news-grid" id="news-container">
        </div>

    <div class="section-title" id="rules">Кодекс Сервера</div>
    <div class="rules-container" id="rules-container">
        </div>

    <footer>
        &copy; 2026 VOID+ • PROJECT BY YURIY BOBOKALO
    </footer>
</div>

<script src="https://unpkg.com/aos@next/dist/aos.js"></script>
<script>
    AOS.init({ duration: 1000, once: true });

    // ==========================================
    // ДАННЫЕ ДЛЯ ОБНОВЛЕНИЯ (РЕДАКТИРУЙ ТУТ)
    // ==========================================
    
    const NEWS_DATA = [
        {
            date: "25 АПРЕЛЯ, 2026",
            title: "Запуск портала",
            text: "Сегодня мы официально запустили веб-интерфейс Void+. Теперь все правила и обновления доступны в одном месте."
        },
        {
            date: "20 АПРЕЛЯ, 2026",
            title: "Стабильность 1.21.11",
            text: "Сервер полностью переведен на версию 1.21.11. Оптимизирована нагрузка и обновлены плагины на чары."
        }
    ];

    const RULES_DATA = [
        {
            title: "1. Основные правила",
            content: `
                ✧ Доступ к серверу разрешен <b>с 15 лет</b>.<br>
                ✧ Играя, вы соглашаетесь со всеми правилами.<br>
                ✧ Незнание не освобождает от ответственности.<br>
                ✧ Кодовое слово для администрации: <b>фембой</b>.
            `
        },
        {
            title: "2. Игровой процесс (PvP & Лут)",
            content: `
                ✧ <b>PvP:</b> Разрешено, но без токсичности. Запрещено систематическое убийство одного и того же игрока (2+ раз).<br>
                ✧ <b>Лут:</b> Можно забирать всё, <b>кроме брони и инструментов</b>. Нарушение — возврат ресурсов или бан.<br>
                ✧ <b>Выход при PvP:</b> Запрещен. Наказание — штраф или бан.
            `
        },
        {
            title: "3. Гриферство и Читы",
            content: `
                ✧ <b>Гриф:</b> Строго запрещен. Порча построек, воровство, использование чужих ферм без разрешения — бан.<br>
                ✧ <b>Читы:</b> X-Ray, макросы, авто-тотем и прочее — <b>бан 12 дней</b>. Повторно — навсегда.<br>
                ✧ <b>Дюп:</b> Разрешен только для TNT, ковров и песка.
            `
        },
        {
            title: "4. Поведение и Чат",
            content: `
                ✧ Запрещены оскорбления родственников, дискриминация по нации или религии.<br>
                ✧ Запрещена реклама сторонних проектов и спам.<br>
                ✧ Запрещено выдавать себя за администрацию.
            `
        },
        {
            title: "5. Территории",
            content: `
                ✧ Лимит города — <b>500 блоков</b>. <br>
                ✧ Вы имеете право закрыть вход на свою территорию табличками.<br>
                ✧ Стройка в радиусе 100 блоков от чужой базы без разрешения — снос постройки.
            `
        }
    ];

    // ==========================================
    // ЛОГИКА ОТОБРАЖЕНИЯ
    // ==========================================

    // Загрузка новостей
    const newsContainer = document.getElementById('news-container');
    NEWS_DATA.forEach(item => {
        newsContainer.innerHTML += `
            <div class="news-item">
                <span class="news-date">${item.date}</span>
                <h3>${item.title}</h3>
                <p>${item.text}</p>
            </div>
        `;
    });

    // Загрузка правил
    const rulesContainer = document.getElementById('rules-container');
    RULES_DATA.forEach((item, index) => {
        rulesContainer.innerHTML += `
            <div class="rule-group">
                <div class="rule-header" onclick="toggleRule(this)">
                    <h3>${item.title}</h3>
                    <i class="fas fa-plus"></i>
                </div>
                <div class="rule-content">
                    ${item.content}
                </div>
            </div>
        `;
    });

    function toggleRule(element) {
        element.parentElement.classList.toggle('active');
        const icon = element.querySelector('i');
        icon.classList.toggle('fa-plus');
        icon.classList.toggle('fa-minus');
    }

    // Фоновые звезды
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let stars = [];

    function initStars() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        stars = [];
        for(let i=0; i<100; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2,
                o: Math.random()
            });
        }
    }
    window.addEventListener('resize', initStars);
    initStars();

    function animate() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        ctx.fillStyle = "#fff";
        stars.forEach(s => {
            ctx.globalAlpha = s.o;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
            ctx.fill();
        });
        requestAnimationFrame(animate);
    }
    animate();

    function copyIP() {
        navigator.clipboard.writeText("PLAY.VOIDPLUS.ME");
        const btn = document.querySelector('.copy-btn');
        btn.innerText = "COPIED!";
        setTimeout(() => { btn.innerText = "COPY IP"; }, 2000);
    }
</script>
</body>
</html>
