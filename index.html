<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Void+ | Minecraft Vanilla+</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        header {
            text-align: center;
            padding: 80px 20px;
        }
        h1 {
            font-size: 4rem;
            margin: 0;
            letter-spacing: 10px;
            text-transform: uppercase;
            border-bottom: 2px solid #ffffff;
        }
        .subtitle {
            margin-top: 20px;
            color: #888888;
            letter-spacing: 3px;
        }
        .ip-container {
            margin-top: 30px;
            padding: 15px 30px;
            border: 1px solid #ffffff;
            cursor: pointer;
            font-weight: bold;
        }
        .ip-container:hover {
            background: #ffffff;
            color: #000;
        }
        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 1000px;
            margin-top: 50px;
        }
        .card {
            background: #111111;
            padding: 30px;
            text-decoration: none;
            color: #ffffff;
            border: 1px solid #222;
            transition: 0.3s;
        }
        .card:hover {
            border-color: #ffffff;
            background: #1a1a1a;
        }
    </style>
</head>
<body>
    <header>
        <h1>VOID+</h1>
        <div class="subtitle">Vanilla Plus Server Experience</div>
        <div class="ip-container" onclick="copyIP()">PLAY.VOIDPLUS.ME</div>
    </header>

    <div class="links-grid">
        <a href="https://discord.gg/kafGXsKnBD" class="card" target="_blank">
            <h3>Discord</h3>
            <p>Наше сообщество и новости.</p>
        </a>
        <a href="#" class="card">
            <h3>Карта</h3>
            <p>Мир в реальном времени.</p>
        </a>
        <a href="#" class="card">
            <h3>Вики</h3>
            <p>Правила и механики.</p>
        </a>
    </div>

    <script>
        function copyIP() {
            navigator.clipboard.writeText("PLAY.VOIDPLUS.ME");
            alert("IP скопирован!");
        }
    </script>
</body>
</html>
