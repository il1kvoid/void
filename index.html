<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Void+ Client</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at top, #0a0a0f, #000);
      color: #fff;
      overflow-x: hidden;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 50px;
      position: fixed;
      width: 100%;
      top: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      z-index: 1000;
    }

    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 24px;
      font-weight: 800;
      color: #8a2be2;
    }

    nav a {
      margin-left: 30px;
      text-decoration: none;
      color: #ccc;
      transition: 0.3s;
    }

    nav a:hover {
      color: #fff;
    }

    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .hero h1 {
      font-size: 64px;
      font-family: 'Orbitron', sans-serif;
      background: linear-gradient(90deg, #8a2be2, #00ffff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero p {
      margin-top: 20px;
      color: #aaa;
      font-size: 18px;
    }

    .btn {
      margin-top: 30px;
      padding: 15px 40px;
      border-radius: 30px;
      border: none;
      background: linear-gradient(90deg, #8a2be2, #00ffff);
      color: #000;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(138,43,226,0.7);
    }

    .features {
      padding: 100px 50px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      padding: 30px;
      backdrop-filter: blur(15px);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 0 20px rgba(0,255,255,0.3);
    }

    .card h3 {
      margin-bottom: 10px;
      color: #00ffff;
    }

    footer {
      text-align: center;
      padding: 40px;
      color: #666;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
    }
  </style>
</head>
<body>

<canvas id="bg"></canvas>

<header>
  <div class="logo">Void+</div>
  <nav>
    <a href="#">Главная</a>
    <a href="#features">Функции</a>
    <a href="#download">Скачать</a>
  </nav>
</header>

<section class="hero">
  <h1>Void+ Client</h1>
  <p>Премиальный Minecraft клиент нового поколения</p>
  <button class="btn">Скачать</button>
</section>

<section class="features" id="features">
  <div class="card">
    <h3>🚀 Оптимизация</h3>
    <p>Максимальный FPS и стабильность</p>
  </div>
  <div class="card">
    <h3>⚡ Быстродействие</h3>
    <p>Минимальная задержка и плавный геймплей</p>
  </div>
  <div class="card">
    <h3>🎨 UI</h3>
    <p>Современный и красивый интерфейс</p>
  </div>
</section>

<footer>
  © 2026 Void+ Client. Все права защищены.
</footer>

<script>
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 120; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 2,
    dx: (Math.random() - 0.5) * 0.5,
    dy: (Math.random() - 0.5) * 0.5
  });
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    p.x += p.dx;
    p.y += p.dy;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = '#00ffff';
    ctx.fill();

    if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
    if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
  });

  requestAnimationFrame(animate);
}

animate();

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
