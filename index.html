<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Void+ | Official SMP</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@200;400;900&family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />

    <style>
        :root {
            --bg: #000000;
            --accent: #ffffff;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --font-head: 'Unbounded', sans-serif;
            --font-main: 'Syne', sans-serif;
        }

        * { box-sizing: border-box; scroll-behavior: smooth; }
        body {
            margin: 0; background: var(--bg); color: #fff;
            font-family: var(--font-main); overflow-x: hidden;
        }

        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.3; }

        .container { max-width: 1300px; margin: 0 auto; padding: 0 40px; position: relative; z-index: 10; }

        /* --- NAV --- */
        nav {
            position: fixed; top: 0; width: 100%; padding: 30px 0;
            z-index: 1000; backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
        }
        .nav-flex { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: var(--font-head); font-weight: 900; font-size: 1.8rem; color: #fff; text-decoration: none; letter-spacing: -1px; }
        .nav-links a { 
            text-decoration: none; color: #666; font-size: 0.75rem; font-weight: 800; 
            margin-left: 30px; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s;
        }
        .nav-links a:hover { color: #fff; }

        /* --- HERO --- */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .hero h1 { font-family: var(--font-head); font-size: clamp(4rem, 15vw, 10rem); margin: 0; font-weight: 900; letter-spacing: -5px; }
        .hero-sub { color: #555; font-family: var(--font-head); letter-spacing: 10px; font-size: 0.9rem; margin-top: 10px; text-transform: uppercase; }

        .ip-card {
            margin-top: 60px; background: var(--glass); border: 1px solid var(--border);
            padding: 10px; border-radius: 20px; display: flex; align-items: center; cursor: pointer; transition: 0.4s;
        }
        .ip-card:hover { border-color: #fff; transform: translateY(-5px); }
        .ip-val { padding: 15px 40px; font-family: var(--font-head); font-weight: 700; font-size: 1.1rem; letter-spacing: 2px; }
        .ip-copy { background: #fff; color: #000; padding: 15px 30px; border-radius: 12px; font-weight: 900; font-size: 0.8rem; }

        /* --- LINKS BLOCK --- */
        .links-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 40px; width: 100%; max-width: 1000px; }
        .l-box { 
            background: var(--glass); border: 1px solid var(--border); padding: 25px; 
            border-radius: 20px; text-decoration: none; color: #fff; transition: 0.3s;
            display: flex; align-items: center; gap: 15px;
        }
        .l-box:hover { background: #fff; color: #000; }
        .l-box i { font-size: 1.5rem; }

        /* --- RULES SYSTEM --- */
        .section-title { margin: 150px 0 50px; font-family: var(--font-head); font-size: 2.5rem; text-align: center; }
        
        .rules-ui {
            background: var(--glass); border: 1px solid var(--border); border-radius: 40px;
            display: grid; grid-template-columns: 320px 1fr; min-height: 800px; overflow: hidden;
        }
        .rules-menu { border-right: 1px solid var(--border); padding: 40px; background: rgba(0,0,0,0.2); }
        .r-nav { 
            padding: 20px; border-radius: 15px; cursor: pointer; color: #444; 
            font-weight: 800; transition: 0.3s; margin-bottom: 10px; font-size: 0.8rem;
        }
        .r-nav.active { background: #fff; color: #000; }
        
        .rules-content { padding: 60px; height: 800px; overflow-y: auto; line-height: 1.8; }
        .rules-content h2 { font-family: var(--font-head); margin-top: 0; font-size: 2rem; }
        .rule-item { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 20px; padding: 30px; margin-bottom: 20px; }
        .rule-item b { color: #fff; }
        .rule-item i { color: #555; display: block; margin-bottom: 10px; font-style: normal; font-family: 'JetBrains Mono'; font-size: 0.8rem; }

        footer { padding: 100px 0; text-align: center; border-top: 1px solid var(--border); margin-top: 100px; opacity: 0.2; font-size: 0.7rem; letter-spacing: 5px; }

        @media (max-width: 1000px) { .rules-ui { grid-template-columns: 1fr; } .rules-menu { display: flex; overflow-x: auto; padding: 20px; } .r-nav { white-space: nowrap; } }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<nav>
    <div class="container nav-flex">
        <a href="#" class="logo">VOID+</a>
        <div class="nav-links">
            <a href="#rules">Rules</a>
            <a href="https://discord.gg/kafGXsKnBD" target="_blank">Discord</a>
            <a href="https://t.me/VoidVanilaSMP" target="_blank">Telegram</a>
        </div>
    </div>
</nav>

<div class="container">
    <section class="hero">
        <h1 data-aos="fade-up">VOID+</h1>
        <div class="hero-sub" data-aos="fade-up" data-aos-delay="100">Premium SMP Experience</div>
        
        <div class="ip-card" onclick="copyIP()" data-aos="zoom-in" data-aos-delay="200">
            <div class="ip-val" id="ip-text">PLAY.VOIDPLUS.ME</div>
            <div class="ip-copy">COPY IP</div>
        </div>

        <div class="links-grid" data-aos="fade-up" data-aos-delay="300">
            <a href="https://discord.gg/kafGXsKnBD" target="_blank" class="l-box">
                <i class="fab fa-discord"></i>
                <span>Discord Server</span>
            </a>
            <a href="https://t.me/VoidVanilaSMP" target="_blank" class="l-box">
                <i class="fab fa-telegram"></i>
                <span>Telegram Channel</span>
            </a>
            <a href="https://modrinth.com/plugin/plasmo-voice" target="_blank" class="l-box">
                <i class="fas fa-microphone"></i>
                <span>Voice Chat Mod</span>
            </a>
            <a href="https://nightexpressdev.com/excellentenchants/enchantments/list/" target="_blank" class="l-box">
                <i class="fas fa-wand-sparkles"></i>
                <span>Custom Enchants</span>
            </a>
        </div>
    </section>

    <h2 class="section-title" id="rules">КОДЕКС ПРОЕКТА</h2>
    
    <div class="rules-ui" data-aos="fade-up">
        <div class="rules-menu">
            <div class="r-nav active" onclick="showRules('main', this)">ОСНОВНЫЕ</div>
            <div class="r-nav" onclick="showRules('game', this)">ИГРОВОЙ ПРОЦЕСС</div>
            <div class="r-nav" onclick="showRules('behavior', this)">ПОВЕДЕНИЕ</div>
            <div class="r-nav" onclick="showRules('territory', this)">ТЕРРИТОРИИ</div>
            <div class="r-nav" onclick="showRules('mods', this)">МОДЫ И АККАУНТЫ</div>
        </div>
        <div class="rules-content" id="rules-target">
            </div>
    </div>

    <footer>
        &copy; 2026 VOID+ SMP • BY YURIY BOBOKALO
    </footer>
</div>

<script src="https://unpkg.com/aos@next/dist/aos.js"></script>
<script>
    AOS.init({ duration: 1000 });

    const RULES_DB = {
        main: {
            title: "Основные правила",
            html: `
                <div class="rule-item"><i>1.0</i> Доступ к серверу разрешен <b>с 15 лет</b>.</div>
                <div class="rule-item"><i>1.1</i> Играя на сервере вы соглашаетесь со всеми правилами указанными здесь.</div>
                <div class="rule-item"><i>1.2</i> Незнание правил не освобождает вас от ответственности за нарушения.</div>
                <div class="rule-item"><i>1.3</i> Администрация в праве самостоятельно решать, какое наказание выдать.</div>
                <div class="rule-item"><i>1.4</i> Администрации запрещено банить/мутить без веской причины.</div>
                <div class="rule-item"><i>3.5.1</i> Кодовое слово: <b>фембой</b>.</div>
            `
        },
        game: {
            title: "Правила игры",
            html: `
                <div class="rule-item"><i>2.1.1</i> <b>PvP:</b> Разрешено. Запрещены систематические убийства (2+ раза подряд) и вмешательство в чужое PvP без согласия. Наказание: 15 ар / бан 6ч.</div>
                <div class="rule-item"><i>2.1.2</i> <b>Лут:</b> Разрешено забирать всё, кроме <b>брони и инструментов</b>. Отказ возврата: 14 ар + бан 6ч.</div>
                <div class="rule-item"><i>2.2.1</i> Запрещено выходить с сервера во время PvP. Штраф: 8 ар.</div>
                <div class="rule-item"><i>2.3.1</i> Запрещено гриферство, воровство и убийство мобов на чужой территории. Наказание: 10-15 ар / бан 1 день.</div>
                <div class="rule-item"><i>2.4.2</i> Запрещён дюп любых предметов, кроме TNT, ковров и сыпучих блоков. Бан 7 дней.</div>
                <div class="rule-item"><i>2.6.1</i> Запрещено использовать или выяснять сид мира.</div>
            `
        },
        behavior: {
            title: "Правила поведения",
            html: `
                <div class="rule-item"><i>3.1.2</i> Запрещено личное оскорбление родственников игрока.</div>
                <div class="rule-item"><i>3.2.1</i> Запрещена дискриминация (расизм, религия, политика).</div>
                <div class="rule-item"><i>3.5.1</i> Запрещено строительство нацистских символов и атрибутики.</div>
                <div class="rule-item"><i>3.7.2</i> Запрещена реклама сторонних проектов без разрешения.</div>
                <div class="rule-item"><i>3.8.1</i> Запрещено выдавать себя за администрацию.</div>
            `
        },
        territory: {
            title: "Территории",
            html: `
                <div class="rule-item"><i>4.1</i> Городу разрешено занимать территорию до <b>500 блоков</b>. Штраф 20 аров.</div>
                <div class="rule-item"><i>4.2</i> Вы имеете право закрыть вход, установив четкие таблички.</div>
                <div class="rule-item"><i>4.3</i> Стройка или проживание ближе 100 блоков от чужой базы без разрешения Главы — снос постройки.</div>
            `
        },
        mods: {
            title: "Моды и Аккаунты",
            html: `
                <div class="rule-item"><b>ЗАПРЕЩЕНО:</b> X-Ray, FreeCam, Baritone, AutoFish, Auto-Totem, ReplayMod, Tweakeroo, Wurst, ESP всех видов. Бан 12 дней. Повторно — навсегда.</div>
                <div class="rule-item"><i>5.1</i> Мульти-аккаунты запрещены (кроме Discord — до 2 аккаунтов).</div>
                <div class="rule-item"><b>ВАЛЮТА (АРЫ):</b> Глубокосланцевая алмазная руда (Шёлковое касание). Отказ от выплаты штрафа = бан.</div>
            `
        }
    };

    function showRules(key, el) {
        document.querySelectorAll('.r-nav').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        const data = RULES_DB[key];
        document.getElementById('rules-target').innerHTML = `<h2>${data.title}</h2>${data.html}`;
    }

    // Load first group
    showRules('main', document.querySelector('.r-nav'));

    function copyIP() {
        navigator.clipboard.writeText("PLAY.VOIDPLUS.ME");
        const t = document.getElementById('ip-text');
        t.innerText = "COPIED!";
        setTimeout(() => { t.innerText = "PLAY.VOIDPLUS.ME"; }, 2000);
    }

    // Background animation
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function init() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        stars = [];
        for(let i=0; i<150; i++) stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2});
    }
    function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "#fff";
        stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill(); s.y -= 0.2; if(s.y<0) s.y=canvas.height; });
        requestAnimationFrame(draw);
    }
    window.addEventListener('resize', init);
    init(); draw();
</script>
</body>
</html>
